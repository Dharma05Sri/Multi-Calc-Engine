<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusCalc | Premium Calculation Suite</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495090071076386" crossorigin="anonymous"></script>
    
    <style>
        /* Premium Dark-Mode SaaS Theme */
        :root { 
            --bg-color: #09090b; 
            --card-bg: rgba(24, 24, 27, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-light: rgba(255, 255, 255, 0.08);
            --primary-gradient: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%);
            --danger-gradient: linear-gradient(135deg, #fb7185 0%, #e11d48 100%);
            --success-color: #10b981;
            --warning-color: #f59e0b;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
            /* Subtle Hacker Grid Background */
            background-image: 
                linear-gradient(var(--border-light) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-light) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
        }
        
        .container { width: 100%; max-width: 750px; position: relative; z-index: 10; }
        
        /* Header & Branding */
        header { text-align: center; margin-bottom: 40px; }
        h1 { 
            font-size: 3.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px;
            background: var(--primary-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; font-weight: 500; letter-spacing: 0.5px; }

        /* Modern Pill Navigation */
        .nav-container {
            background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border-light);
            border-radius: 50px; padding: 8px; display: flex; justify-content: space-between;
            margin-bottom: 40px; backdrop-filter: blur(10px); flex-wrap: wrap; gap: 5px;
        }
        .tab-btn {
            background: transparent; border: none; color: var(--text-muted);
            padding: 12px 24px; border-radius: 40px; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; flex: 1; text-align: center; min-width: 110px;
        }
        .tab-btn:hover { color: var(--text-main); }
        .tab-btn.active { background: rgba(255, 255, 255, 0.1); color: var(--text-main); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        /* Frosted Glass Calculation Panels */
        .calc-panel {
            background: var(--card-bg); padding: 40px; border-radius: 24px; 
            border: 1px solid var(--border-light); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }
        .calc-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Inputs & Labels */
        .input-group { margin-bottom: 24px; display: flex; flex-direction: column; width: 100%; }
        .input-group label { color: var(--text-muted); margin-bottom: 10px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        input[type="number"] {
            width: 100%; padding: 18px 20px; border-radius: 14px; background: rgba(0,0,0,0.3); 
            border: 1px solid var(--border-light); color: white; font-size: 1.1rem; 
            outline: none; transition: all 0.3s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        input[type="number"]:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); background: rgba(0,0,0,0.5); }
        
        .dual-inputs { display: flex; gap: 20px; }
        @media (max-width: 600px) { .dual-inputs { flex-direction: column; gap: 0; } }

        /* Primary Action Buttons */
        .action-btn {
            width: 100%; padding: 18px; background: var(--primary-gradient); border: none;
            color: white; font-size: 1.1rem; font-weight: 700; letter-spacing: 1px;
            border-radius: 14px; cursor: pointer; transition: all 0.3s ease; margin-top: 10px;
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5);
        }
        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px -5px rgba(59, 130, 246, 0.6); }
        .action-btn:active { transform: translateY(0); }

        /* Results Display */
        .output-box {
            margin-top: 30px; padding: 30px; background: rgba(0,0,0,0.4); border-radius: 16px;
            border: 1px solid var(--border-light); font-size: 2rem; text-align: center; color: white;
            font-weight: 700; letter-spacing: -0.5px; position: relative; overflow: hidden;
        }
        .output-box::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary-gradient);
        }
        .status-text { font-size: 1rem; margin-top: 15px; font-weight: 500; letter-spacing: 0.5px; color: var(--text-muted); }

        /* -------------------------------------------
           Standard Matrix Calculator Grid 
           ------------------------------------------- */
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
        .calc-display { 
            grid-column: span 4; background: rgba(0,0,0,0.5); padding: 35px 25px; font-size: 3.5rem; 
            text-align: right; border-radius: 18px; border: 1px solid var(--border-light); 
            color: white; font-weight: 300; letter-spacing: 1px; overflow-x: auto; margin-bottom: 25px; 
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.3);
        }
        .grid-btn { 
            padding: 24px 10px; font-size: 1.5rem; background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border-light); color: var(--text-main); border-radius: 14px; 
            cursor: pointer; transition: all 0.2s ease; font-weight: 500; display: flex; justify-content: center; align-items: center;
        }
        .grid-btn:hover { background: rgba(255,255,255,0.1); transform: scale(0.97); }
        .grid-btn.operator { color: #38bdf8; background: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.2); font-weight: 600; }
        .grid-btn.danger { background: var(--danger-gradient); color: white; border: none; font-weight: 700; box-shadow: 0 4px 15px rgba(225, 29, 72, 0.4); }
        .grid-btn.equal { grid-column: span 2; background: var(--text-main); color: #000; border: none; font-weight: 700; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }
        .grid-btn.equal:hover { background: #e2e8f0; }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>NexusCalc</h1>
            <div class="subtitle">Ultimate Pro-Max Analytics Suite</div>
        </header>

        <div class="nav-container">
            <button class="tab-btn active" onclick="switchTab('standard', this)">Standard</button>
            <button class="tab-btn" onclick="switchTab('academic', this)">Academic</button>
            <button class="tab-btn" onclick="switchTab('commercial', this)">Commercial</button>
            <button class="tab-btn" onclick="switchTab('bmi', this)">Biometrics</button>
            <button class="tab-btn" onclick="switchTab('sip', this)">Wealth</button>
        </div>

        <div id="standard" class="calc-panel active">
            <div class="calc-display" id="calcScreen">0</div>
            <div class="calc-grid">
                <button class="grid-btn danger" onclick="clearScreen()">AC</button>
                <button class="grid-btn operator" onclick="deleteLast()">DEL</button>
                <button class="grid-btn operator" onclick="appendValue('/')">÷</button>
                <button class="grid-btn operator" onclick="appendValue('*')">×</button>
                
                <button class="grid-btn" onclick="appendValue('7')">7</button>
                <button class="grid-btn" onclick="appendValue('8')">8</button>
                <button class="grid-btn" onclick="appendValue('9')">9</button>
                <button class="grid-btn operator" onclick="appendValue('-')">−</button>
                
                <button class="grid-btn" onclick="appendValue('4')">4</button>
                <button class="grid-btn" onclick="appendValue('5')">5</button>
                <button class="grid-btn" onclick="appendValue('6')">6</button>
                <button class="grid-btn operator" onclick="appendValue('+')">+</button>
                
                <button class="grid-btn" onclick="appendValue('1')">1</button>
                <button class="grid-btn" onclick="appendValue('2')">2</button>
                <button class="grid-btn" onclick="appendValue('3')">3</button>
                <button class="grid-btn equal" onclick="calculateResult()">=</button>
                
                <button class="grid-btn" onclick="appendValue('0')" style="grid-column: span 2;">0</button>
                <button class="grid-btn" onclick="appendValue('.')">•</button>
            </div>
        </div>

        <div id="academic" class="calc-panel">
            <div class="dual-inputs">
                <div class="input-group">
                    <label>Marks Obtained</label>
                    <input type="number" id="marksObtained" placeholder="e.g. 450">
                </div>
                <div class="input-group">
                    <label>Maximum Marks</label>
                    <input type="number" id="marksTotal" placeholder="e.g. 500">
                </div>
            </div>
            <button class="action-btn" onclick="calcAcademic()">Evaluate Academic Profile</button>
            <div class="output-box" id="academicOutput">
                Awaiting Data...
                <div class="status-text">--</div>
            </div>
        </div>

        <div id="commercial" class="calc-panel">
            <div class="input-group">
                <label>Original Product Price (₹)</label>
                <input type="number" id="origPrice" placeholder="e.g. 2999">
            </div>
            <div class="dual-inputs">
                <div class="input-group">
                    <label>Discount Applied (%)</label>
                    <input type="number" id="discPercent" placeholder="e.g. 20">
                </div>
                <div class="input-group">
                    <label>Sales Tax / GST (%)</label>
                    <input type="number" id="taxPercent" placeholder="e.g. 18">
                </div>
            </div>
            <button class="action-btn" onclick="calcCommercial()">Calculate Final Price</button>
            <div class="output-box" id="commercialOutput">
                Awaiting Data...
                <div class="status-text">--</div>
            </div>
        </div>

        <div id="bmi" class="calc-panel">
            <div class="dual-inputs">
                <div class="input-group">
                    <label>Body Height (cm)</label>
                    <input type="number" id="bmiHeight" placeholder="e.g. 180">
                </div>
                <div class="input-group">
                    <label>Body Weight (kg)</label>
                    <input type="number" id="bmiWeight" placeholder="e.g. 75">
                </div>
            </div>
            <button class="action-btn" onclick="calcBMI()">Analyze Biometrics</button>
            <div class="output-box" id="bmiOutput">
                Awaiting Data...
                <div class="status-text">--</div>
            </div>
        </div>

        <div id="sip" class="calc-panel">
            <div class="input-group">
                <label>Monthly Investment Amount (₹)</label>
                <input type="number" id="sipAmount" placeholder="e.g. 10000">
            </div>
            <div class="dual-inputs">
                <div class="input-group">
                    <label>Expected Return Rate (%)</label>
                    <input type="number" id="sipRate" placeholder="e.g. 12.5">
                </div>
                <div class="input-group">
                    <label>Investment Tenure (Years)</label>
                    <input type="number" id="sipYears" placeholder="e.g. 15">
                </div>
            </div>
            <button class="action-btn" onclick="calcSIP()">Project Wealth Growth</button>
            <div class="output-box" id="sipOutput">
                Awaiting Data...
                <div class="status-text">--</div>
            </div>
        </div>

    </div>

    <script>
        // --- SEAMLESS TAB NAVIGATION ---
        function switchTab(tabId, element) {
            document.querySelectorAll('.calc-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }

        // --- 1. STANDARD CALCULATOR LOGIC ---
        const screen = document.getElementById('calcScreen');
        let currentExpression = '';

        function appendValue(val) {
            if (screen.innerText === '0' && val !== '.') { currentExpression = val; } 
            else { currentExpression += val; }
            screen.innerText = currentExpression;
        }

        function clearScreen() { currentExpression = ''; screen.innerText = '0'; }

        function deleteLast() {
            currentExpression = currentExpression.slice(0, -1);
            screen.innerText = currentExpression === '' ? '0' : currentExpression;
        }

        function calculateResult() {
            try {
                // Safeguard evaluation
                let formattedExpression = currentExpression.replace(/[^-()\d/*+.]/g, '');
                const result = new Function('return ' + formattedExpression)();
                
                // Fix infinite decimals
                screen.innerText = Number.isInteger(result) ? result : parseFloat(result.toFixed(6));
                currentExpression = screen.innerText;
            } catch (error) {
                screen.innerText = 'Error'; currentExpression = '';
            }
        }

        // --- 2. ACADEMIC ENGINE LOGIC ---
        function calcAcademic() {
            const obtained = parseFloat(document.getElementById('marksObtained').value);
            const total = parseFloat(document.getElementById('marksTotal').value);
            const out = document.getElementById('academicOutput');

            if (!obtained || !total || obtained < 0 || total <= 0 || obtained > total) {
                out.innerHTML = `<span style="color: #fb7185;">Input Error</span><div class="status-text">Please verify your marks.</div>`;
                return;
            }

            const percentage = (obtained / total) * 100;
            const cgpa = (percentage / 9.5).toFixed(2); 
            
            let grade = '', color = '';
            if(percentage >= 90) { grade = 'A+ (Distinction)'; color = 'var(--success-color)'; }
            else if(percentage >= 80) { grade = 'A (Excellent)'; color = '#38bdf8'; }
            else if(percentage >= 70) { grade = 'B (Very Good)'; color = '#a3e635'; }
            else if(percentage >= 60) { grade = 'C (Good)'; color = 'var(--warning-color)'; }
            else if(percentage >= 40) { grade = 'D (Pass)'; color = '#fb923c'; }
            else { grade = 'F (Fail)'; color = '#fb7185'; }

            out.innerHTML = `
                ${percentage.toFixed(2)}%
                <div style="font-size: 1.2rem; color: #cbd5e1; margin-top: 5px;">Estimated CGPA: ${cgpa}</div>
                <div class="status-text" style="color: ${color};">Academic Standing: ${grade}</div>
            `;
        }

        // --- 3. COMMERCIAL ENGINE LOGIC ---
        function calcCommercial() {
            const price = parseFloat(document.getElementById('origPrice').value);
            const disc = parseFloat(document.getElementById('discPercent').value) || 0;
            const tax = parseFloat(document.getElementById('taxPercent').value) || 0;
            const out = document.getElementById('commercialOutput');

            if (!price || price <= 0) {
                out.innerHTML = `<span style="color: #fb7185;">Input Error</span><div class="status-text">Enter a valid base price.</div>`;
                return;
            }

            const discountAmount = price * (disc / 100);
            const discountedPrice = price - discountAmount;
            const taxAmount = discountedPrice * (tax / 100);
            const finalPrice = discountedPrice + taxAmount;

            out.innerHTML = `
                ₹${finalPrice.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                <div class="status-text" style="color: var(--success-color);">
                    Discount Saved: ₹${discountAmount.toFixed(2)} &nbsp;|&nbsp; Tax Applied: ₹${taxAmount.toFixed(2)}
                </div>
            `;
        }

        // --- 4. BIOMETRIC SCANNER LOGIC ---
        function calcBMI() {
            const h = parseFloat(document.getElementById('bmiHeight').value);
            const w = parseFloat(document.getElementById('bmiWeight').value);
            const out = document.getElementById('bmiOutput');

            if (!h || !w || h <= 0 || w <= 0) {
                out.innerHTML = `<span style="color: #fb7185;">Scan Failed</span><div class="status-text">Enter valid height and weight.</div>`;
                return;
            }

            const meters = h / 100;
            const bmi = (w / (meters * meters)).toFixed(1);
            
            let statusMsg = '', color = '';
            if (bmi < 18.5) { statusMsg = "Underweight Classification"; color = "var(--warning-color)"; } 
            else if (bmi <= 24.9) { statusMsg = "Optimal Health Range"; color = "var(--success-color)"; } 
            else if (bmi <= 29.9) { statusMsg = "Overweight Classification"; color = "#fb923c"; } 
            else { statusMsg = "High Risk (Obese)"; color = "#fb7185"; }

            out.innerHTML = `
                ${bmi} <span style="font-size: 1rem; color: var(--text-muted);">kg/m²</span>
                <div class="status-text" style="color: ${color};">Medical Status: ${statusMsg}</div>
            `;
        }

        // --- 5. WEALTH PROJECTOR LOGIC ---
        function calcSIP() {
            const p = parseFloat(document.getElementById('sipAmount').value);
            const r = parseFloat(document.getElementById('sipRate').value);
            const t = parseFloat(document.getElementById('sipYears').value);
            const out = document.getElementById('sipOutput');

            if (!p || !r || !t || p <= 0 || r <= 0 || t <= 0) {
                out.innerHTML = `<span style="color: #fb7185;">Projection Failed</span><div class="status-text">Enter valid investment parameters.</div>`;
                return;
            }

            const i = (r / 100) / 12;
            const n = t * 12;
            const futureValue = p * ((Math.pow(1 + i, n) - 1) / i) * (1 + i);
            const totalInvested = p * n;
            const profit = futureValue - totalInvested;

            const format = (num) => "₹" + Math.round(num).toLocaleString('en-IN');

            out.innerHTML = `
                ${format(futureValue)}
                <div class="status-text" style="color: var(--text-muted);">
                    Total Invested: <span style="color: #fff;">${format(totalInvested)}</span> &nbsp;|&nbsp; 
                    Est. Profit: <span style="color: var(--success-color);">${format(profit)}</span>
                </div>
            `;
        }
    </script>
</body>
</html>
